<button
  mat-icon-button
  [matMenuTriggerFor]="notificationMenu"
  (menuOpened)="onMenuOpened()"
  aria-label="Notifications">
  <mat-icon [matBadge]="unreadCount() || null" matBadgeColor="warn" matBadgeSize="small">
    notifications
  </mat-icon>
</button>

<mat-menu #notificationMenu="matMenu" class="notification-menu" xPosition="before">
  <div class="menu-header" (click)="$event.stopPropagation()">
    <strong>Notifications</strong>
    @if (unreadCount() > 0) {
      <button mat-button (click)="markAllRead()">Mark all read</button>
    }
  </div>

  <mat-divider />

  @if (loading()) {
    <div class="menu-loading">
      <mat-spinner diameter="28" />
    </div>
  } @else if (!notifications().length) {
    <p class="menu-empty">No notifications yet.</p>
  } @else {
    @for (notification of notifications(); track notification.id) {
      <button mat-menu-item class="notification-item" [class.unread]="!notification.isRead" (click)="openNotification(notification)">
        <div class="item-content">
          <span class="item-title">{{ notification.title }}</span>
          <span class="item-message">{{ notification.message }}</span>
          <span class="item-time">{{ notification.createdDate | date:'medium' }}</span>
        </div>
      </button>
    }
  }
</mat-menu>
