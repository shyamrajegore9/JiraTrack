<h2 mat-dialog-title>Crop Profile Picture</h2>

<mat-dialog-content>
  <div class="crop-frame">
    <img [src]="imageSrc" [style.transform]="'scale(' + zoom() + ')'" alt="Crop preview" />
  </div>
  <mat-slider min="1" max="2" step="0.05" discrete>
    <input matSliderThumb [ngModel]="zoom()" (ngModelChange)="onZoomChange($event)" />
  </mat-slider>
  <p class="hint">Adjust zoom, then save. Image is cropped to a square from the center.</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-flat-button color="primary" (click)="save()">Save</button>
</mat-dialog-actions>
