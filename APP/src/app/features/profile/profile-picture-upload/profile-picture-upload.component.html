<div class="avatar-section">
  <div class="avatar-preview">
    @if (previewUrl()) {
      <img [src]="previewUrl()" alt="Profile picture" />
    } @else {
      <mat-icon>account_circle</mat-icon>
    }
    @if (uploading()) {
      <div class="overlay"><mat-spinner diameter="32"></mat-spinner></div>
    }
  </div>
  <div class="avatar-actions">
    <button mat-stroked-button type="button" [disabled]="uploading()" (click)="fileInput.click()">
      <mat-icon>photo_camera</mat-icon>
      Change Photo
    </button>
    <input
      #fileInput
      type="file"
      hidden
      accept="image/jpeg,image/png,image/gif,image/webp"
      (change)="onFileSelected($event)" />
    <p class="hint">JPG, PNG, GIF, or WebP · max 10 MB</p>
  </div>
</div>
