services:
  api:
    build:
      context: .
      dockerfile: API/Dockerfile
    ports:
      - "5005:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=JiraTrackDB;User Id=sa;Password=JiraTrack@12345;TrustServerCertificate=True;MultipleActiveResultSets=true"
      JwtSettings__Secret: "JiraTrack-Docker-Secret-Key-Min-32-Chars-2026!"
      Cors__Origins__0: "http://localhost:4200"
      Cors__Origins__1: "http://localhost"
    volumes:
      - api_uploads:/app/UploadedFiles
    depends_on:
      sqlserver:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: APP/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "JiraTrack@12345"
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "JiraTrack@12345" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data:
  api_uploads:
